<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terriwin — Full Stack Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #09090a;
      --glass:       rgba(210, 195, 168, 0.055);
      --glass-hov:   rgba(210, 195, 168, 0.10);
      --border:      rgba(210, 195, 168, 0.10);
      --border-hov:  rgba(210, 195, 168, 0.24);
      --accent:      #c9b99a;
      --accent-dim:  rgba(201, 185, 154, 0.15);
      --radius:      14px;
      --blur:        blur(20px);
      --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
      --text:        #ede9e0;
      --text-2:      #9a9080;
      --text-3:      #52504a;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      line-height: 1.6;
    }

    /* noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(201,185,154,0.07) 0%, transparent 70%);
      top: -180px; right: -80px;
    }
    .orb-2 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(140,120,100,0.05) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      animation-duration: 25s;
      animation-direction: reverse;
    }
    @keyframes float {
      0%,100% { transform: translate(0,0); }
      33%      { transform: translate(24px,-16px); }
      66%      { transform: translate(-16px,24px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .orb { animation: none; }
      .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    }

    /* reveal */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.08s; }
    .reveal-d2 { transition-delay: 0.16s; }
    .reveal-d3 { transition-delay: 0.24s; }
    .reveal-d4 { transition-delay: 0.32s; }

    /* lang fade */
    [data-i18n] {
      transition: opacity 0.28s ease, transform 0.28s var(--ease-out), filter 0.28s ease;
      will-change: opacity, transform, filter;
    }
    body.lang-switching [data-i18n] {
      opacity: 0;
      transform: translateY(4px) scale(0.985);
      filter: blur(4px);
    }

    /* layout */
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 28px;
      position: relative;
      z-index: 1;
    }

    /* ── NAV ─────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 0;
      transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
    }
    nav.scrolled {
      background: rgba(9,9,10,0.82);
      border-bottom: 1px solid var(--border);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }
    .nav-inner {
      display: flex;
      align-items: center;
    }
    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
      /* clear the fixed corner hamburger smoothly at every width — no breakpoint jump.
         tapers from 44px (narrow, logo sits past the bars) to 0 (wide, aligned to content) */
      margin-left: max(0px, 44px - max(0px, (100vw - 1160px) / 2));
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    /* lang dropdown */
    .lang-dropdown { position: relative; }
    .lang-trigger {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 38px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      backdrop-filter: var(--blur);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .lang-trigger:hover { background: var(--glass-hov); border-color: var(--border-hov); color: var(--text); }
    .lang-trigger .chevron {
      width: 14px; height: 14px;
      transition: transform 0.25s var(--ease-out);
      flex-shrink: 0; opacity: 0.6;
    }
    .lang-dropdown.open .chevron { transform: rotate(180deg); }
    .lang-flag { font-size: 15px; line-height: 1; }

    .lang-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 160px;
      background: rgba(14,13,12,0.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      z-index: 200;
      transform-origin: top right;
      animation: menuIn 0.18s var(--ease-out) forwards;
    }
    @keyframes menuIn {
      from { opacity: 0; transform: scale(0.94) translateY(-6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .lang-menu[hidden] { display: none; }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }
    .lang-option:hover { background: var(--glass-hov); color: var(--text); }
    .lang-option.active { color: var(--accent); font-weight: 600; }
    .lang-option .check { width: 14px; height: 14px; margin-left: auto; flex-shrink: 0; opacity: 0; color: var(--accent); }
    .lang-option.active .check { opacity: 1; }


    /* ── HERO ────────────────────────────────────────────── */
    #hero {
      height: 100dvh;
      display: flex;
      align-items: center;
      padding-top: 66px;
      padding-bottom: 40px;
    }
    .hero-split {
      display: grid;
      grid-template-columns: 44% 56%;
      gap: 0;
      align-items: center;
      width: 100%;
    }

    /* LEFT */
    .hero-left {
      padding-right: 48px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(201,185,154,0.18);
      border-radius: 100px;
      padding: 6px 14px;
      width: fit-content;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .tag-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: dotPulse 2.4s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }
    .hero-name {
      font-size: clamp(3.2rem, 5.5vw, 5.2rem);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.0;
      color: var(--text);
    }
    .hero-sub {
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--text-2);
      max-width: 420px;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      background: var(--accent);
      color: #0a0908;
      border: none;
      width: fit-content;
      transition: background 0.2s, transform 0.22s var(--ease-out), box-shadow 0.22s;
    }
    .hero-cta:hover {
      background: #ddd0b8;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(201,185,154,0.3);
    }
    .hero-cta svg { width: 17px; height: 17px; }

    /* RIGHT — orbital */
    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .orbital-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    /* Orbital timeline */
    #orbital {
      position: relative;
      width: 360px;
      height: 360px;
      flex-shrink: 0;
    }
    .orbital-track {
      position: absolute;
      top: 50%; left: 50%;
      width: 270px; height: 270px;
      border: 1px solid rgba(201,185,154,0.10);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .orbital-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      z-index: 10;
      pointer-events: none;
    }
    .orbital-core {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #e8d9c0, var(--accent));
      box-shadow: 0 0 18px rgba(201,185,154,0.6), 0 0 36px rgba(201,185,154,0.2);
      animation: corePulse 3s ease-in-out infinite;
    }
    .orbital-ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(201,185,154,0.18);
      animation: ringOut 3s ease-out infinite;
      transform: translate(-50%,-50%) scale(0);
      opacity: 0;
    }
    .orbital-ring-1 { width: 44px; height: 44px; }
    .orbital-ring-2 { width: 68px; height: 68px; animation-delay: 1.5s; }
    @keyframes ringOut {
      0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0.55; }
      100% { transform: translate(-50%,-50%) scale(1.0); opacity: 0; }
    }
    @keyframes corePulse {
      0%,100% { box-shadow: 0 0 18px rgba(201,185,154,0.6), 0 0 36px rgba(201,185,154,0.2); }
      50%      { box-shadow: 0 0 26px rgba(201,185,154,0.9), 0 0 52px rgba(201,185,154,0.35); }
    }

    /* nodes */
    .orbit-node {
      position: absolute;
      top: 50%; left: 50%;
      width: 42px; height: 42px;
      margin: -21px 0 0 -21px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(14,13,12,0.85);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: background 0.28s, border-color 0.28s, box-shadow 0.28s;
      /* transform is set by JS every frame */
    }
    .orbit-node:hover { border-color: rgba(201,185,154,0.45); }
    .orbit-node.active {
      background: rgba(201,185,154,0.12);
      border-color: var(--accent);
      box-shadow: 0 0 0 6px rgba(201,185,154,0.08), 0 0 20px rgba(201,185,154,0.2);
    }
    .orbit-node.related {
      border-color: rgba(201,185,154,0.38);
      animation: relPulse 1.8s ease-in-out infinite;
    }
    @keyframes relPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(201,185,154,0.25); }
      50%      { box-shadow: 0 0 0 5px rgba(201,185,154,0); }
    }
    .orbit-node svg {
      width: 17px; height: 17px;
      stroke: var(--text-3);
      transition: stroke 0.25s;
      pointer-events: none;
    }
    .orbit-node:hover svg, .orbit-node.active svg { stroke: var(--accent); }
    .orbit-node.related svg { stroke: rgba(201,185,154,0.6); }

    .orbit-node-label {
      position: absolute;
      top: calc(100% + 7px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-3);
      white-space: nowrap;
      pointer-events: none;
      transition: color 0.25s;
    }
    .orbit-node:hover .orbit-node-label,
    .orbit-node.active .orbit-node-label { color: var(--text-2); }

    /* info panel — zero-height flex child, content escapes downward via overflow:visible */
    .orbit-info {
      position: relative;
      width: 360px;
      height: 0;
      overflow: visible;
      flex-shrink: 0;
    }

    /* idle hint */
    .orbit-idle {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 4px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .orbit-idle.out {
      opacity: 0;
      transform: translateY(-5px);
      pointer-events: none;
    }
    .orbit-idle-line {
      flex: 1;
      height: 1px;
    }
    .orbit-idle-line-l { background: linear-gradient(90deg, transparent, var(--border)); }
    .orbit-idle-line-r { background: linear-gradient(270deg, transparent, var(--border)); }
    .orbit-idle-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      white-space: nowrap;
      letter-spacing: 0.07em;
      flex-shrink: 0;
    }

    /* active stage card */
    .orbit-card {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: rgba(14,13,12,0.72);
      border: 1px solid var(--border);
      border-top: 2px solid rgba(201,185,154,0.5);
      border-radius: var(--radius);
      padding: 16px 18px 14px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-out);
      box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(201,185,154,0.06);
    }
    .orbit-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .orbit-card-ghost {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      opacity: 0.045;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      letter-spacing: -0.05em;
    }
    .orbit-card-inner { position: relative; z-index: 1; }
    .orbit-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .orbit-card-tag {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .orbit-card-counter {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }
    .orbit-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.015em;
    }
    .orbit-card-desc {
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text-2);
      margin-bottom: 14px;
    }
    .orbit-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .orbit-dot {
      height: 3px;
      width: 18px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s, width 0.3s var(--ease-out);
    }
    .orbit-dot.active {
      background: var(--accent);
      width: 28px;
    }

    /* connection lines */
    .orbital-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .orbit-connector {
      stroke: rgba(201,185,154,0.18);
      stroke-width: 1;
      stroke-dasharray: 3 4;
      fill: none;
      transition: stroke 0.3s;
    }
    .orbit-connector.active { stroke: rgba(201,185,154,0.35); }

    /* ── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 860px) {
      body { height: auto; overflow: auto; }
      #hero { height: auto; padding: 100px 0 60px; }
      .hero-split {
        grid-template-columns: 1fr;
        gap: 48px;
      }
      .hero-left { padding-right: 0; }
      .hero-right { align-items: center; }
      #orbital { width: 300px; height: 300px; }
      .orbit-info { width: 300px; }
      .orbital-track { width: 210px; height: 210px; }
      .orbit-card-ghost { font-size: 60px; }
      .orbit-card-desc { font-size: 12px; }
      /* heavy blur freezes mobile GPU on load — hide on mobile */
      .orb { display: none; }
    }

    /* ── Projects trigger — fixed true top-left corner ────────── */
    .projects-trigger {
      position: fixed;
      top: 14px;
      left: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 6px;
      width: 44px;
      height: 44px;
      padding: 0 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      /* fade out when drawer is open — the drawer's own X takes over */
      transition: opacity 0.18s ease;
    }
    .projects-trigger.open {
      opacity: 0;
      pointer-events: none;
    }
    .ptrigger-line {
      display: block;
      height: 2.5px;
      border-radius: 2px;
      transition: background 0.22s, width 0.25s var(--ease-out);
    }
    /* staggered widths: long · short · long */
    .ptrigger-line:nth-child(1) { width: 20px; background: rgba(210,195,168,0.55); }
    .ptrigger-line:nth-child(2) { width: 12px; background: rgba(210,195,168,0.32); }
    .ptrigger-line:nth-child(3) { width: 20px; background: rgba(210,195,168,0.55); }

    /* hover: accent + middle bar extends */
    .projects-trigger:hover .ptrigger-line { background: var(--accent); }
    .projects-trigger:hover .ptrigger-line:nth-child(2) { width: 20px; }

    /* ── Projects overlay ──────────────────────────────────────── */
    .projects-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 148;
      pointer-events: none;
      transition: background 0.35s ease;
    }
    .projects-overlay.open {
      background: rgba(0,0,0,0.55);
      pointer-events: auto;
    }

    /* ── Projects drawer ───────────────────────────────────────── */
    .projects-drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 380px;
      max-width: calc(100vw - 40px);
      background: rgba(9,9,10,0.97);
      border-right: 1px solid rgba(210,195,168,0.07);
      backdrop-filter: blur(48px);
      -webkit-backdrop-filter: blur(48px);
      z-index: 149;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .projects-drawer.open { transform: translateX(0); }

    .pdrawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .pdrawer-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
      font-family: 'Space Mono', monospace;
    }
    .pdrawer-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    /* close = same three-bar language as the trigger, locked in the X state */
    .pdrawer-close {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .pclose-line {
      display: block;
      width: 20px;
      height: 2.5px;
      border-radius: 2px;
      background: var(--accent);
      transition: transform 0.3s var(--ease-out);
    }
    .pclose-line:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
    .pclose-line:nth-child(2) { opacity: 0; }
    .pclose-line:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }
    /* hover: tighten the X a touch for a subtle, premium reaction */
    .pdrawer-close:hover .pclose-line:nth-child(1) { transform: translateY(8.5px) rotate(135deg); }

      concept: '<path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>',
      design:  '<path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>',

    // ── Language engine ───────────────────────────────────────────
    const langMeta = {
      ru: { flag: '🇷🇺', label: 'Русский' },
      en: { flag: '🇺🇸', label: 'English' },

    let lang = localStorage.getItem('lang') || 'ru';

    const langDropdown = document.getElementById('langDropdown');
    const langTrigger  = document.getElementById('langTrigger');
    const langMenu     = document.getElementById('langMenu');
    const langFlag     = document.getElementById('langFlag');
    const langLabel    = document.getElementById('langLabel');

    function applyLang(l, animate = false) {
      lang = l;
      document.documentElement.lang = l;
      localStorage.setItem('lang', l);

      langFlag.textContent  = langMeta[l].flag;
      langLabel.textContent = langMeta[l].label;

      langMenu.querySelectorAll('.lang-option').forEach(opt => {
        const active = opt.dataset.lang === l;
        opt.classList.toggle('active', active);
        opt.setAttribute('aria-selected', active);
      });

      const els = [...document.querySelectorAll('[data-i18n]')];

      if (!animate) {
        els.forEach(el => {
          const v = t[l][el.dataset.i18n];
          if (v !== undefined && v !== '') el.textContent = v;
        });
        updateOrbitalLabels(l);
        return;
      }

      // ── Step 1: snapshot ───────────────────────────────────────
      const snaps = els.map(el => {
        const cs = getComputedStyle(el);
        if (cs.display === 'inline') el.style.display = 'inline-block';
        const isWide = cs.display === 'block' && el.offsetWidth > 260;
        return { el, isWide, oldW: el.offsetWidth, oldH: el.offsetHeight };
      });

      // ── Step 2: freeze ────────────────────────────────────────
      snaps.forEach(({ el, oldW, oldH }) => {
        el.style.width    = oldW + 'px';
        el.style.height   = oldH + 'px';
        el.style.overflow = 'hidden';
      });

      // ── Step 3: fade out ──────────────────────────────────────
      document.body.classList.add('lang-switching');

      setTimeout(() => {
        // ── Step 4: swap + measure ─────────────────────────────
        snaps.forEach(({ el }) => {
          const v = t[l][el.dataset.i18n];
          if (v !== undefined && v !== '') el.textContent = v;
        });
        updateOrbitalLabels(l); // update orbital labels while invisible

        snaps.forEach(s => {
          s.newH = s.el.scrollHeight;
          if (!s.isWide) {
            s.el.style.width = 'auto';
            s.newW = s.el.scrollWidth;
            s.el.style.width = s.oldW + 'px';
          } else {
            s.newW = s.oldW;
          }
        });

        // Categorise: grow = resize while invisible; shrink = resize after fade-in
        snaps.forEach(s => {
          const dW = !s.isWide && Math.abs(s.newW - s.oldW) > 1;
          const dH = Math.abs(s.newH - s.oldH) > 1;
          if (!dW && !dH) { s.strategy = 'none'; return; }
          const growing = (dW && s.newW > s.oldW) || (dH && s.newH > s.oldH);
          s.strategy = growing ? 'grow' : 'shrink';
        });

        // ── Step 5: animate GROW items while invisible ─────────
        const hasGrow = snaps.some(s => s.strategy === 'grow');
        snaps.filter(s => s.strategy === 'grow').forEach(({ el, newW, newH, isWide }) => {
          const parts = [];
          if (!isWide) parts.push('width 0.22s ease');
          parts.push('height 0.22s ease');
          el.style.transition = parts.join(', ');
          el.offsetHeight;
          if (!isWide) el.style.width  = newW + 'px';
          el.style.height = newH + 'px';
        });

          snaps.forEach(({ el }) => { el.style.transition = ''; });

          document.body.classList.remove('lang-switching');

          // ── Step 7: after fade-in → animate SHRINK items ──────

            snaps.forEach(({ el, newW, newH, isWide, strategy, oldW, oldH }) => {
              if (strategy === 'shrink') {
                const parts = [];
                if (!isWide) parts.push('width 0.26s ease');
                if (Math.abs(newH - oldH) > 1) parts.push('height 0.26s ease');
                el.style.transition = parts.join(', ');
                el.offsetHeight;
                if (!isWide) el.style.width  = newW + 'px';
                if (Math.abs(newH - oldH) > 1) el.style.height = newH + 'px';
                setTimeout(() => {
                  el.style.cssText = el.style.cssText
                    .replace(/\s*(width|height|overflow|transition|display)\s*:[^;]+;?/g, '');
                }, 300);
              } else {
                el.style.width = el.style.height = el.style.overflow = el.style.display = '';
              }
            });
          }, 310);

        }, hasGrow ? 260 : 0);

      }, 265);
    }

    // ── Dropdown ──────────────────────────────────────────────────
    function openMenu() {
      langMenu.hidden = false;
      langDropdown.classList.add('open');
      langTrigger.setAttribute('aria-expanded', 'true');
    }
    function closeMenu() {
      langMenu.hidden = true;
      langDropdown.classList.remove('open');
      langTrigger.setAttribute('aria-expanded', 'false');
    }
    langTrigger.addEventListener('click', e => {
      e.stopPropagation();
      langMenu.hidden ? openMenu() : closeMenu();
    });
    langMenu.querySelectorAll('.lang-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const l = opt.dataset.lang;
        closeMenu();
        if (l !== lang) applyLang(l, true);
      });
    });
    document.addEventListener('click', closeMenu);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

    // ── Orbital timeline ──────────────────────────────────────────
    let rotation = 0;
    let autoRotate = true;
    let activeId = null;
    let orbLang = lang;
    let nodePositions = {};
    let rafId = null;
    let cachedNodes = null;

    // Dynamic metrics — recalculated on resize so mobile works correctly
    let orbCenter = 180;
    let orbRadius = 126;

    function updateOrbMetrics() {
      const size = document.getElementById('orbital').offsetWidth || 360;
      orbCenter = size / 2;
      orbRadius = Math.round(size * 0.35); // 126px@360, 105px@300
    }

    function buildOrbital() {
      const container = document.getElementById('orbital');
      const stageList = stages.ru; // use ru for node count (same count in both langs)

      stageList.forEach((s, i) => {
        const node = document.createElement('div');
        node.className = 'orbit-node';
        node.dataset.id = s.id;
        node.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">${icons[s.icon]}</svg>
          <span class="orbit-node-label">${s.title}</span>
        `;
        node.addEventListener('click', e => { e.stopPropagation(); toggleNode(s.id); });
        container.appendChild(node);
      });

      container.addEventListener('click', () => { if (activeId !== null) clearActive(); });
    }

    function updateOrbitalLabels(l) {
      orbLang = l;
      const nodeEls = document.querySelectorAll('.orbit-node');
      const stageList = stages[l];
      nodeEls.forEach((node, i) => {
        const label = node.querySelector('.orbit-node-label');
        if (label) label.textContent = stageList[i].title;
      });

      if (activeId !== null) {
        const stage = stageList.find(s => s.id === activeId);
        if (stage) {
          const n = stageList.length;
          document.getElementById('orbitGhost').textContent   = String(activeId).padStart(2,'0');
          document.getElementById('orbitCardTag').textContent = t[l]['orbital.stage'] || 'Stage';
          document.getElementById('orbitStep').textContent    = `${String(activeId).padStart(2,'0')} / ${String(n).padStart(2,'0')}`;
          document.getElementById('orbitTitle').textContent   = stage.title;
          document.getElementById('orbitDesc').textContent    = stage.desc;
        }
      }
    }

    function toggleNode(id) {
      if (activeId === id) { clearActive(); return; }
      activeId = id;
      autoRotate = false;

      const stageList = stages[orbLang];
      const stage = stageList.find(s => s.id === id);
      const n = stageList.length;

      // fill card
      document.getElementById('orbitGhost').textContent   = String(id).padStart(2,'0');
      document.getElementById('orbitCardTag').textContent = t[orbLang]['orbital.stage'] || 'Stage';
      document.getElementById('orbitStep').textContent    = `${String(id).padStart(2,'0')} / ${String(n).padStart(2,'0')}`;
      document.getElementById('orbitTitle').textContent   = stage.title;
      document.getElementById('orbitDesc').textContent    = stage.desc;

      // progress dots
      document.querySelectorAll('.orbit-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === id - 1);
      });

      // transition: idle → card
      document.getElementById('orbitIdle').classList.add('out');
      document.getElementById('orbitCard').classList.add('visible');

      // node classes
      document.querySelectorAll('.orbit-node').forEach((node, i) => {
        const nid = stageList[i].id;
        node.classList.toggle('active',   nid === id);
        node.classList.toggle('related',  stage.relatedIds.includes(nid) && nid !== id);
      });

      drawConnectors(id);
    }

    function clearActive() {
      activeId = null;
      autoRotate = true;
      document.getElementById('orbitIdle').classList.remove('out');
      document.getElementById('orbitCard').classList.remove('visible');
      document.querySelectorAll('.orbit-node').forEach(n => n.classList.remove('active','related'));
      document.getElementById('orbitalSvg').innerHTML = '';
    }

    function drawConnectors(id) {
      const svg = document.getElementById('orbitalSvg');
      svg.innerHTML = '';
      const stageList = stages[orbLang];
      const stage = stageList.find(s => s.id === id);
      if (!stage) return;

      const activePos = nodePositions[id];
      if (!activePos) return;

      stage.relatedIds.forEach(rid => {
        const relPos = nodePositions[rid];
        if (!relPos) return;
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', orbCenter + activePos.x);
        line.setAttribute('y1', orbCenter + activePos.y);
        line.setAttribute('x2', orbCenter + relPos.x);
        line.setAttribute('y2', orbCenter + relPos.y);
        line.classList.add('orbit-connector','active');
        svg.appendChild(line);
      });
    }

    let lastTick = 0;
    function tickOrbital(ts) {
      rafId = requestAnimationFrame(tickOrbital);
      if (ts - lastTick < 20) return; // cap ~50fps to reduce renderer load
      lastTick = ts;
      if (autoRotate) rotation = (rotation + 0.30) % 360;

      if (!cachedNodes) cachedNodes = document.querySelectorAll('.orbit-node');
      const nodes = cachedNodes;
      const total = nodes.length;

      nodes.forEach((node, i) => {
        const angle  = ((i / total) * 360 + rotation) * (Math.PI / 180);
        const x      = Math.cos(angle) * orbRadius;
        const y      = Math.sin(angle) * orbRadius;
        const depth  = Math.sin(angle); // -1..1
        const stageList = stages[orbLang];
        const sid    = stageList[i]?.id;

        nodePositions[sid] = { x, y };

        const isActive  = node.classList.contains('active');
        const isRelated = node.classList.contains('related');
        const scale     = isActive ? 1.25 : 0.82 + 0.18 * ((1 + depth) / 2);
        const opacity   = isActive ? 1    : (isRelated ? 0.9 : Math.max(0.22, 0.28 + 0.72 * ((1 + depth) / 2)));
        const zIndex    = isActive ? 200  : Math.round(30 + 60 * ((1 + depth) / 2));

        node.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        node.style.opacity   = opacity;
        node.style.zIndex    = zIndex;
      });

      // Redraw connectors if active
      if (activeId !== null) drawConnectors(activeId);

    }

    // ── Init ──────────────────────────────────────────────────────
    applyLang(lang, false);
    buildOrbital();
    updateOrbitalLabels(lang); // nodes didn't exist during applyLang, update now
    updateOrbMetrics();
    tickOrbital(0);

    // Recompute metrics when screen size changes (rotation, resize)
    window.addEventListener('resize', () => {
      updateOrbMetrics();
      if (activeId !== null) drawConnectors(activeId);
    });

    // ── Projects drawer ───────────────────────────────────────────
    const projectsTrigger = document.getElementById('projectsTrigger');
    const projectsDrawer  = document.getElementById('projectsDrawer');
    const projectsOverlay = document.getElementById('projectsOverlay');
    const projectsClose   = document.getElementById('projectsClose');
    let drawerOpen = false;

    function openProjects() {
      drawerOpen = true;
      projectsTrigger.classList.add('open');
      projectsDrawer.classList.add('open');
      projectsOverlay.classList.add('open');
      projectsDrawer.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
      document.querySelectorAll('.pcard').forEach((card, i) => {
        setTimeout(() => card.classList.add('revealed'), 55 + i * 80);
      });
    }

    function closeProjects() {
      drawerOpen = false;
      projectsTrigger.classList.remove('open');
      projectsDrawer.classList.remove('open');
      projectsOverlay.classList.remove('open');
      projectsDrawer.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      document.querySelectorAll('.pcard').forEach(c => c.classList.remove('revealed'));
    }

    projectsTrigger.addEventListener('click', () => drawerOpen ? closeProjects() : openProjects());
    projectsOverlay.addEventListener('click', closeProjects);
    projectsClose.addEventListener('click', closeProjects);
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && drawerOpen) closeProjects(); });

    // ── Nav scroll ────────────────────────────────────────────────
    const nav = document.getElementById('nav');

    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    });

    // ── Scroll reveal ─────────────────────────────────────────────
    const revealEls = document.querySelectorAll('.reveal');
    const revealObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
    }, { threshold: 0.12 });
    revealEls.forEach(el => revealObs.observe(el));
  </script>
</body>
</html>
