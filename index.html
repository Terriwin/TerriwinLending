<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terriwin — Full Stack Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #09090a;
      --bg-2:          #111112;
      --glass:         rgba(210, 195, 168, 0.055);
      --glass-hov:     rgba(210, 195, 168, 0.095);
      --border:        rgba(210, 195, 168, 0.10);
      --border-hov:    rgba(210, 195, 168, 0.22);
      --accent:        #c9b99a;
      --accent-dim:    rgba(201, 185, 154, 0.18);
      --radius:        16px;
      --blur:          blur(20px);
      --ease-out:      cubic-bezier(0.22, 1, 0.36, 1);
      --text:          #ede9e0;
      --text-2:        #9a9080;
      --text-3:        #52504a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,185,154,0.07) 0%, transparent 70%);
      top: -200px; right: -100px;
      animation: float 18s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(140,120,100,0.05) 0%, transparent 70%);
      bottom: 0; left: -100px;
      animation: float 22s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(30px, -20px); }
      66%       { transform: translate(-20px, 30px); }
    }

    /* Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .orb { animation: none; }
    }

    /* Lang fade */
    [data-i18n] { transition: opacity 0.2s ease; }
    body.lang-switching [data-i18n] { opacity: 0; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    section { padding: 100px 0; }

    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: background 0.3s, border-color 0.3s, transform 0.3s var(--ease-out);
    }
    .glass:hover {
      background: var(--glass-hov);
      border-color: var(--border-hov);
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 0;
      transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
    }
    nav.scrolled {
      background: rgba(9, 9, 10, 0.80);
      border-bottom: 1px solid var(--border);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Lang toggle */
    .lang-toggle {
      display: flex;
      align-items: center;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      backdrop-filter: var(--blur);
    }
    .lang-btn {
      padding: 7px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }
    .lang-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .lang-btn:hover:not(.active) { color: var(--text-2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #0a0908;
      border: none;
    }
    .btn-primary:hover {
      background: #ddd0b8;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,185,154,0.25);
    }
    .btn-ghost {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--glass-hov);
      border-color: var(--border-hov);
      transform: translateY(-2px);
    }

    /* HERO */
    #hero {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      padding: 120px 0 80px;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .hero-tag-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }
    .hero-name {
      font-size: clamp(52px, 8vw, 88px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.0;
      margin-bottom: 20px;
    }
    .hero-name span {
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 60%, #a08868 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-title {
      font-size: clamp(16px, 2.5vw, 22px);
      color: var(--text-2);
      font-weight: 400;
      margin-bottom: 40px;
      max-width: 520px;
      line-height: 1.7;
    }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-3);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: bounce 2s ease-in-out infinite;
    }
    .scroll-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, var(--accent), transparent);
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* SECTION HEADER */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .section-title {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    .section-text {
      color: var(--text-2);
      font-size: 17px;
      line-height: 1.75;
      max-width: 560px;
    }

    /* ABOUT */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 64px;
    }
    .about-card { padding: 32px; }
    .about-card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .about-card-icon svg { width: 20px; height: 20px; stroke: var(--accent); }
    .about-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
    .about-card p { font-size: 14px; color: var(--text-2); line-height: 1.7; }

    /* SKILLS */
    .skills-wrap { margin-top: 56px; display: flex; flex-direction: column; gap: 40px; }
    .skills-row { display: flex; flex-direction: column; gap: 12px; }
    .skills-row-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .skills-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag {
      padding: 8px 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      backdrop-filter: var(--blur);
      transition: all 0.2s var(--ease-out);
      cursor: default;
    }
    .skill-tag:hover {
      background: var(--accent-dim);
      border-color: var(--border-hov);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* TESTIMONIALS */
    .testimonials-track-wrap { margin-top: 64px; position: relative; }
    .testimonials-track { overflow: hidden; }
    .testimonials-inner {
      display: flex;
      gap: 20px;
      transition: transform 0.5s var(--ease-out);
    }
    .testimonial-card {
      min-width: calc(50% - 10px);
      padding: 36px;
      position: relative;
      flex-shrink: 0;
    }
    .testimonial-quote {
      font-size: 36px;
      line-height: 1;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      margin-bottom: 20px;
      opacity: 0.6;
    }
    .testimonial-text { font-size: 16px; line-height: 1.75; color: var(--text-2); margin-bottom: 28px; }
    .testimonial-author { display: flex; align-items: center; gap: 14px; }
    .testimonial-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dim), var(--glass));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .testimonial-name { font-size: 14px; font-weight: 600; }
    .testimonial-role { font-size: 13px; color: var(--text-3); margin-top: 2px; }

    .testimonials-controls { display: flex; align-items: center; gap: 16px; margin-top: 32px; }
    .dot-wrap { display: flex; gap: 6px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    .dot.active { width: 20px; border-radius: 3px; background: var(--accent); }
    .ctrl-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-2);
    }
    .ctrl-btn:hover { background: var(--glass-hov); border-color: var(--border-hov); color: var(--text); }
    .ctrl-btn svg { width: 16px; height: 16px; }

    /* CONTACT */
    .contact-card {
      padding: 72px 64px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .contact-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,185,154,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .contact-card .section-text { margin: 0 auto 40px; text-align: center; }
    .contact-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      position: relative;
      z-index: 1;
    }
    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-3);
    }
    .footer-inner a { color: var(--text-3); text-decoration: none; transition: color 0.2s; }
    .footer-inner a:hover { color: var(--accent); }

    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 0 24px;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 768px) {
      section { padding: 72px 0; }
      .about-grid { grid-template-columns: 1fr; }
      .testimonial-card { min-width: 100%; }
      nav .nav-links { display: none; }
      .contact-card { padding: 48px 24px; }
      .hero-scroll { display: none; }
      .footer-inner { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>

    // ── Language engine ───────────────────────────────────────────
    let lang = localStorage.getItem('lang') || 'ru';

    function applyLang(l, animate = false) {
      lang = l;
      document.documentElement.lang = l;
      localStorage.setItem('lang', l);

      // Buttons state
      document.querySelectorAll('.lang-btn').forEach(btn => {
        const active = btn.dataset.lang === l;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active);
      });

      // Apply translations (with optional fade)
      const els = document.querySelectorAll('[data-i18n]');
      if (animate) {
        document.body.classList.add('lang-switching');
        setTimeout(() => {
          els.forEach(el => {
            const val = t[l][el.dataset.i18n];
            if (val !== undefined) el.textContent = val;
          });
          document.body.classList.remove('lang-switching');
        }, 200);
      } else {
        els.forEach(el => {
          const val = t[l][el.dataset.i18n];
          if (val !== undefined) el.textContent = val;
        });
      }
    }

    // Initial apply (no animation on load)
    applyLang(lang, false);

    // Toggle handler
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.lang !== lang) applyLang(btn.dataset.lang, true);
      });
    });

    // ── Nav scroll ────────────────────────────────────────────────
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    // ── Scroll reveal ─────────────────────────────────────────────
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) { el.target.classList.add('visible'); observer.unobserve(el.target); }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // ── Testimonials slider ───────────────────────────────────────
    const inner = document.getElementById('inner');
    const dotsEl = document.getElementById('dots');
    const cards = inner.querySelectorAll('.testimonial-card');
    const perView = window.innerWidth < 768 ? 1 : 2;
    const maxSlides = cards.length - perView + 1;
    let cur = 0;

    for (let i = 0; i < maxSlides; i++) {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', `Slide ${i + 1}`);
      d.addEventListener('click', () => go(i));
      dotsEl.appendChild(d);
    }

    function go(idx) {
      cur = Math.max(0, Math.min(idx, maxSlides - 1));
      const cardW = cards[0].offsetWidth + 20;
      inner.style.transform = `translateX(-${cur * cardW}px)`;
      dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
    }

    document.getElementById('prev').addEventListener('click', () => go(cur - 1));
    document.getElementById('next').addEventListener('click', () => go(cur + 1));

    let autoTimer = setInterval(() => go((cur + 1) % maxSlides), 5000);
    inner.parentElement.addEventListener('mouseenter', () => clearInterval(autoTimer));
    inner.parentElement.addEventListener('mouseleave', () => {
      autoTimer = setInterval(() => go((cur + 1) % maxSlides), 5000);
    });

    let startX = 0;
    inner.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    inner.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) go(dx < 0 ? cur + 1 : cur - 1);
    });
