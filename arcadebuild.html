<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcadeBuild — Terriwin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #09090a;
      --accent: #c9b99a;
      --text:   #e8e0d0;
      --text-2: rgba(232,224,208,0.55);
      --border: rgba(210,195,168,0.08);
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
    }

    /* back link */
    .back {
      position: fixed;
      top: 20px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      text-decoration: none;
      transition: color 0.2s;
      z-index: 10;
    }
    .back:hover { color: var(--accent); }
    .back svg { width: 14px; height: 14px; }

    /* placeholder center */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 12px;
      padding: 40px 24px;
      text-align: center;
    }
    .label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .title {
      font-family: 'Space Mono', monospace;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .sub {
      font-size: 14px;
      color: var(--text-2);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <a href="/" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    terriwin.vercel.app
  </a>

  <div class="center">
    <div class="label">Проект 01</div>
    <div class="title">ArcadeBuild</div>
    <div class="sub">Страница в разработке</div>
  </div>

</body>
</html>
